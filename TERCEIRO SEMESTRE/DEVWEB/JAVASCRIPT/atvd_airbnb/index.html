<!doctype html>
<html lang="pt-BR">
    
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIRBNB</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <div class="card">

      <header>
        <p>R$ <span>620</span> noite</p>
      </header>

      <main>
        <form action="#">
          <label for="checkin">Check-in</label>
          <input type="date" id="checkin" name="checkin" />

          <label for="checkout">Check-out</label>
          <input type="date" id="checkout" name="checkout" />

          <label for="hospedes">Hóspedes</label>

          <select id="hospedes" name="hospedes">
            <option value="1">1 hóspede</option>
            <option value="2">2 hóspedes</option>
            <option value="3">3 hóspedes</option>
            <option value="4">4 hóspedes</option>
          </select>

          <button type="submit">RESERVAR</button>
        </form>

        <p>Você ainda não será cobrado</p>

        <div>
          <p>
            R$ <span class="">620</span> x <span class="qtd-hosp"> noites</span>
          </p>
        </div>

        <div>
          <h1>Taxa de limpeza</h1>
          <p>R$: <span>120</span></p>
        </div>

        <div>
          <h1>Taxa de serviço</h1>
          <p>R$: <span></span></p>
        </div>
      </main>

      <footer>
        <div>
          <h1>Total sem impostos</h1>
          <p>R$: <span></span></p>
        </div>
      </footer>

    </div>
    <script src="js/scripts.js"></script>
  </body>
</html>
