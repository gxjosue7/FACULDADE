<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMULADOR DE EMPRÉSTIMO</title>

</head>

<body>
    <div class="card">
        <header>
            <a href="index.html">
                <h1 id="simulador"> Simulador de Empréstimo </h1>
            </a>
        </header>
        <main>

            <section class="emprestimo">

                <form action="#">

                    <label for="renda">Renda bruta mensal (R$)</label>
                    <input type="number" id="renda" placeholder="Ex: 3000">

                    <label for="valor">Valor do empréstimo (R$)</label>
                    <input type="number" id="valor" placeholder="Ex: 10000">

                    <label for="prazo">Prazo para pagamentos</label>
                    <input type="number" id="prazo" placeholder="Ex: 24 meses,  mas apenas em algarismos.">

                    <button onclick="calcular()">Calcular</button>
                    <h3 id="resultado"></h3>
                </form>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
